site_name: Manimax
site_description: Python authoring, Rust runtime, wgpu rendering — a from-scratch ManimGL replacement.
site_url: https://chcardoz.github.io/manimax/
repo_url: https://github.com/chcardoz/manimax
edit_uri: edit/main/docs/public/

docs_dir: docs/public
site_dir: site

theme:
  name: material
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.instant
    - navigation.sections
    - toc.follow
  palette:
    - scheme: default
      primary: deep purple
      toggle: { icon: material/weather-night, name: Switch to dark mode }
    - scheme: slate
      primary: deep purple
      toggle: { icon: material/weather-sunny, name: Switch to light mode }

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [python]
          options:
            docstring_style: google
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
  - markdown-exec

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Examples: examples.md
  - Reference: reference.md
