site_name: Manimax
site_description: Python authoring, Rust runtime, wgpu rendering — a from-scratch ManimGL replacement.
site_url: https://chcardoz.github.io/manimax/
repo_url: https://github.com/chcardoz/manimax
edit_uri: edit/main/docs/public/

docs_dir: docs/public
site_dir: site

theme:
  name: material
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.instant
    - navigation.sections
    - toc.follow
  palette:
    - scheme: slate
      primary: black
      accent: grey
      toggle: { icon: material/weather-sunny, name: Switch to light mode }
    - scheme: default
      primary: black
      accent: grey
      toggle: { icon: material/weather-night, name: Switch to dark mode }

extra_css:
  - assets/theme.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [python]
          options:
            docstring_style: google
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
  - markdown-exec

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Examples: examples.md
  - Concepts:
      - Overview: concepts/index.md
      - Architecture: concepts/architecture.md
      - IR schema: concepts/ir-schema.md
  - Reference: reference.md
  - Design notes:
      - Index: design/index.md
      - ManimGL fidelity: design/manimgl-fidelity.md
      - Why an IR: design/why-an-ir.md
      - Wire format: design/wire-format.md
      - Internally-tagged unions: design/internally-tagged-unions.md
      - Pixel cache (removed): design/pixel-cache.md
      - In-process encoder: design/encoder-in-process.md
      - Hardware encoder: design/encoder-hardware.md
      - Text stack: design/text-stack.md
      - CI on lavapipe: design/ci-lavapipe.md
      - Slice C decisions: design/slice-c-decisions.md
      - Slice D decisions: design/slice-d-decisions.md
      - Slice E decisions: design/slice-e-decisions.md
  - Changelog: changelog.md
  - Roadmap: roadmap.md
  - Contributing:
      - Overview: contributing/index.md
      - Porting from ManimGL: contributing/porting-from-manimgl.md
      - Gotchas: contributing/gotchas.md
      - Performance: contributing/performance.md
